stages:
  - test
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

test:
  stage: test
  tags:
    - shared
  before_script:
    - python3 -m venv .ci-venv
    - source .ci-venv/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[test]"
  script:
    - source .ci-venv/bin/activate
    - LD_LIBRARY_PATH="" QT_QPA_PLATFORM=offscreen python -m pytest tests/ -v
  cache:
    key: pip-cache
    paths:
      - .ci-venv/
      - .pip-cache/

pages:
  stage: deploy
  image: node:20
  script:
    - cd website
    - npm ci
    - npm run build
    - mv build ../public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - website/**/*
        - .gitlab-ci.yml
