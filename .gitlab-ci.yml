stages:
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

test:
  stage: test
  tags:
    - shared
  before_script:
    - python3 -m venv .ci-venv
    - source .ci-venv/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[test]"
  script:
    - source .ci-venv/bin/activate
    - LD_LIBRARY_PATH="" QT_QPA_PLATFORM=offscreen python -m pytest tests/ -v
  cache:
    key: pip-cache
    paths:
      - .ci-venv/
      - .pip-cache/

.build_template: &build_template
  stage: build
  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pyinstaller
    - pyinstaller --name Montaris-X --onedir --windowed --noconfirm main.py
  artifacts:
    paths:
      - dist/
    expire_in: 30 days

build-linux:
  <<: *build_template
  image: python:3.11
  tags:
    - shared
  before_script:
    - apt-get update && apt-get install -y libgl1-mesa-glx libegl1 libxkbcommon0 libdbus-1-3

build-windows:
  <<: *build_template
  tags:
    - windows
  before_script:
    - choco install python311 -y --no-progress

build-macos:
  <<: *build_template
  tags:
    - macos
  before_script:
    - brew install python@3.11 || true
