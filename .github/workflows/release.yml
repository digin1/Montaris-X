name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  actions: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: montaris-x-windows
            ext: .exe
          - os: macos-latest
            artifact: montaris-x-macos
            ext: ""
          - os: ubuntu-latest
            artifact: montaris-x-linux
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --name montaris-x --onefile --windowed --hidden-import montaris --collect-all montaris montaris/__main__.py

      - name: Sign macOS binary (ad-hoc)
        if: runner.os == 'macOS'
        run: codesign --force --sign - dist/montaris-x

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/montaris-x*

  sign-windows:
    needs: build
    runs-on: ubuntu-latest
    if: vars.SIGNPATH_ORGANIZATION_ID != ''

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: montaris-x-windows
          path: unsigned

      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: montaris-x
          signing-policy-slug: release-signing
          artifact-configuration-slug: exe
          github-artifact-id: montaris-x-windows
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: montaris-x-windows-signed
          path: signed/montaris-x.exe

  release:
    needs: [build, sign-windows]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download signed Windows artifact
        if: needs.sign-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: montaris-x-windows-signed
          path: artifacts/montaris-x-windows

      - name: Download unsigned Windows artifact (fallback)
        if: needs.sign-windows.result != 'success'
        uses: actions/download-artifact@v4
        with:
          name: montaris-x-windows
          path: artifacts/montaris-x-windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: montaris-x-linux
          path: artifacts/montaris-x-linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: montaris-x-macos
          path: artifacts/montaris-x-macos

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/montaris-x-windows/montaris-x.exe release/montaris-x-windows.exe
          cp artifacts/montaris-x-linux/montaris-x release/montaris-x-linux
          chmod +x release/montaris-x-linux
          if [ -f artifacts/montaris-x-macos/montaris-x ]; then
            cp artifacts/montaris-x-macos/montaris-x release/montaris-x-macos
            chmod +x release/montaris-x-macos
          else
            cd artifacts/montaris-x-macos && zip -r ../../release/montaris-x-macos.zip . && cd ../..
          fi

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
