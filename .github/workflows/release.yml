name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: montaris-x-windows
            ext: .exe
          - os: macos-latest
            artifact: montaris-x-macos
            ext: ""
          - os: ubuntu-latest
            artifact: montaris-x-linux
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --name montaris-x --onefile --windowed --hidden-import montaris --collect-all montaris montaris/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/montaris-x*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/montaris-x-windows/montaris-x.exe release/montaris-x-windows.exe
          cp artifacts/montaris-x-linux/montaris-x release/montaris-x-linux
          chmod +x release/montaris-x-linux
          # macOS artifact is a .app bundle or binary
          if [ -f artifacts/montaris-x-macos/montaris-x ]; then
            cp artifacts/montaris-x-macos/montaris-x release/montaris-x-macos
            chmod +x release/montaris-x-macos
          else
            cd artifacts/montaris-x-macos && zip -r ../../release/montaris-x-macos.zip . && cd ../..
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
